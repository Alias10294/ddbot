services:
  frontend:
    container_name: ddbot-frontend
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

  backend:
    container_name: ddbot-backend
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      APP_ENV: ${APP_ENV:-dev}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
      LANGFLOW_BASE_URL: http://langflow:7860
      LANGFLOW_FLOW_ID: ${LANGFLOW_FLOW_ID:-uphf-security-agent}
      LANGFLOW_API_KEY: ${LANGFLOW_API_KEY:-dev-langflow-key}
    depends_on:
      - langflow

  langflow:
    container_name: ddbot-langflow
    build: ./langflow
    ports:
      - "7860:7860"
    environment:
      LANGFLOW_API_KEY_SOURCE: env
      LANGFLOW_API_KEY: ${LANGFLOW_API_KEY:-dev-langflow-key}
      LANGFLOW_AUTO_LOGIN: "True"
      LANGFLOW_LOAD_FLOWS_PATH: /app/flows
    volumes:
      - ./data/langflow:/app/langflow
    depends_on:
      ollama-pull:
        condition: service_completed_successfully

  ollama:
    container_name: ddbot-ollama
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama
      
  ollama-pull:
    container_name: ddbot-ollama-pull
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - until ollama list >/dev/null 2>&1; do echo 'Waiting for Ollama...'; sleep 2; done; ollama pull gpt-oss:20b-cloud
    depends_on:
      - ollama