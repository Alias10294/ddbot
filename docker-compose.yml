services:
  backend:
    build:
      context: ./backend
    container_name: security-agent-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/app:/backend/app
    restart: unless-stopped
  frontend:
    build:
      context: ./frontend
    container_name: security-agent-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
  ollama:
    image: ollama/ollama
    container_name: security-agent-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data: