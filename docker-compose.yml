services:
  backend:
    build:
      context: ./backend
    container_name: security-agent-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/app:/backend/app
    restart: unless-stopped
  frontend:
    build:
      context: ./frontend
    container_name: security-agent-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
  langflow:
    image: langflowai/langflow:latest
    ports:
      - "7860:7860"
    environment:
      - LANGFLOW_AUTO_LOGIN=false
      - LANGFLOW_SUPERUSER=admin
      - LANGFLOW_SUPERUSER_PASSWORD=admin
      - LANGFLOW_NEW_USER_IS_ACTIVE=true
    volumes:
      - langflow-data:/app/langflow
    depends_on:
      - ollama
  ollama:
    image: ollama/ollama
    container_name: security-agent-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

volumes:
  langflow-data:
  ollama-data: